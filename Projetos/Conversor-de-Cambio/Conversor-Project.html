<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert Money - My Serv Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Conversor-Project.css">
</head>
<body>
    
    <header class="branding-logo">
        <img src="assets/logo-myserv-transparente.png" alt="MyServ Logo">
    </header>

    <div class="container">  
        <main>
            <section class="section-input">
                <label>Converter de:</label>
                <select id="moeda-select-de">
                    <option value="BRL">🇧🇷 Real brasileiro</option>
                    <option value="USD">🇺🇸 Dólar americano</option>
                    <option value="EUR">🇪🇺 Euro</option>
                    <option value="BTC">₿ Bitcoin</option>
                </select>

                <label>Valor a converter:</label>
                <input type="number" id="valor-input" placeholder="R$ 10.000,00" class="input-money">
            </section>

            <section class="section-selection">
                <img src="assets/seta.png" alt="Seta" class="arrow-down">
                
                <label>Converter para:</label>
                <select id="moeda-select-para">
                    <option value="USD">🇺🇸 Dólar americano</option>
                    <option value="EUR">🇪🇺 Euro</option>
                    <option value="BTC">₿ Bitcoin</option>
                    <option value="BRL">🇧🇷 Real brasileiro</option>
                </select>

                <button type="button" id="converter-button">Converter</button>
            </section>

            <section class="section-result">
                <div class="currency-box">
                    <img src="assets/brasil.png" alt="Moeda Origem" id="bandeira-de">
                    <p class="currency-name" id="nome-moeda-de">Real</p>
                    <p class="currency-value" id="valor-de-display">R$ 0,00</p>
                </div>

                <img src="assets/seta.png" alt="Seta" class="arrow-right">

                <div class="currency-box">
                    <img src="assets/usa.png" alt="Moeda Destino" id="bandeira-para">
                    <p class="currency-name" id="nome-moeda-para">Dólar americano</p>
                    <p class="currency-value" id="valor-para-display">US$ 0,00</p>
                </div>
            </section>
        </main>
    </div>

    <script src="Conversor-Project.js"></script>
</body>
</html>
