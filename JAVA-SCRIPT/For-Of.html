<!DOCTYPE html>
<html lang="pt.br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input placeholder="Digite o nome do contato">
    <p></p>
    <button onclick="search()">Procurar Contato</button>
</body>
<script>

    let p = document.querySelector("p")
    let input = document.querySelector("input")
    
    const contacts = [
        {"name": "Maria", number: "(34) 99999-9999"},
        {"name": "João", number: "(34) 99999-9998"},
        {"name": "Pedro", number: "(34) 99999-9997"},
        {"name": "Ana", number: "(34) 99999-9996"},
        {"name": "Lucas", number: "(34) 99999-9995"}
    ];

    function search() {
        
        for (const contact of contacts) {
            
            if(input.value.toLowerCase() === contact.name.toLowerCase()){

                p.innerHTML = `Contato Encontrado Nome: ${contact.name} Telefone: ${contact.number}`
                
                break
            } else {
                p.innerHTML = "Contato não encontrado, tente novamente"
            }
        }
    }

</script>

</html>
