<h1>Form</h1>

<form method="get" enctype="multipart/form-data">
    <h1>Digite seu Endereço</h1>

    <label>
        Rua/Av:
        <input type="text" name="rua" autocomplete="street-address" />
    </label>

    <label>
        Numero:
        <input type="number" name="numero" autocomplete="address-line1" />
    </label>

    <label>
        Email:
        <input type="email" name="email" />
    </label>
    <br>
    <br>
    <label>
        Arquivo:
        <input type="file" name="Arquivo" />
    </label>
    <br>
    <br>
    <button type="reset">Reset</button>
    <button type="submit">Enviar dados</button>
</form>
<br>
<br>
<h2>Button</h2>

<form action="get">
    <label>

        <button type="reset">Reset</button>
        <br>
        <button type="submit">Enviar</button>
        <br>
        <button type="button" onclick="">Enviar</button>
        <br>
        <button type="button" disabled="">Enviar</button>

    </label>

</form>
