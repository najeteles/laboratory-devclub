<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Serv - Velocidade da Luz</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles-tunel-1.css">
    
    <style>
        /* RESET SENIOR */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        /* O CANVAS (ONDE A MÁGICA 3D REAL ACONTECE SEM QUEBRAR) */
        #canvasWormhole {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* OVERLAY NARRATIVO (CENTRALIZADO SOBRE O TÚNEL) */
        .overlay-narrativa {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* A CENA (FLEXBOX: IMAGEM EM CIMA, TEXTO EMBAIXO) */
        .cena {
            position: absolute;
            display: flex;
            flex-direction: column; /* Força o texto para baixo da imagem */
            align-items: center;
            width: 90%;
            max-width: 600px;
            opacity: 0;
            pointer-events: none;
            
            /* Animação Sequencial em Looping */
            animation: cicloDeCena 30s infinite;
        }

        /* ESTILO DAS IMAGENS */
        .cena img {
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.4);
            margin-bottom: 25px; /* Espaço entre a imagem e o texto */
        }

        .cena .logo {
            max-width: 300px;
            border-radius: 0;
            box-shadow: none;
            filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.6));
        }

        /* ESTILO DOS TEXTOS */
        .cena .frase {
            color: #fff;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .cena h1.frase { font-size: 40px; font-weight: 900; letter-spacing: -1px; }
        .cena h2.frase { font-size: 24px; font-weight: 200; letter-spacing: 2px; }

        /* DELAYS PARA CADA CENA (CADA UMA DURA 10s NO CICLO DE 30s) */
        .c1 { animation-delay: 0s; }
        .c2 { animation-delay: 10s; }
        .c3 { animation-delay: 20s; }

        /* ANIMAÇÃO DE EXIBIÇÃO (SURGE DO FUNDO -> CRESCE -> SOME) */
        @keyframes cicloDeCena {
            0%   { transform: scale(0.4); opacity: 0; filter: blur(10px); }
            10%  { transform: scale(1); opacity: 1; filter: blur(0); }
            25%  { transform: scale(1.05); opacity: 1; filter: blur(0); }
            33%  { transform: scale(1.5); opacity: 0; filter: blur(20px); }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="canvasWormhole"></canvas>

    <div class="overlay-narrativa">
        
        <div class="cena c1">
            <img src="./img/img-1.jpg" alt="Tarefas Repetitivas">
            <h2 class="frase">ARE REPETITIVE TASKS<br>TAKING OVER YOUR DAY?</h2>
        </div>

        <div class="cena c2">
            <img src="./img/img-2.png" alt="Automação">
            <h2 class="frase">WE'VE AUTOMATED EVERYTHING.<br>BECAUSE HERE, YOUR TIME IS WHAT MATTERS.</h2>
        </div>

        <div class="cena c3">
            <img src="./img/logo-cranio.png" alt="Logo My Serv" class="logo">
            <h1 class="frase">YOUR AGENT IS JUST A CLICK AWAY</h1>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('canvasWormhole');
        const ctx = canvas.getContext('2d');
        
        // Ajusta o canvas para a tela toda
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Configuração das Partículas (Paredes de Nebulosa Ciano e Roxo)
        const particles = [];
        const particleCount = 600; // Quantidade de estrelas/neon

        for (let i = 0; i < particleCount; i++) {
            // Posicionamento circular (Garante que fique nas PAREDES do túnel, deixando o centro vazio)
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 0.5 + 0.5; 
            
            particles.push({
                x: Math.cos(angle) * radius,
                y: Math.sin(angle) * radius,
                z: Math.random(), // Profundidade 3D
                color: Math.random() > 0.5 ? '#ffffff' : '#ffffff' // Cores Neon My Serv
            });
        }

        // Loop de Animação 3D
        function animate() {
            // Fundo semi-transparente cria o "rastro" que simula tecido espacial e velocidade
            ctx.fillStyle = '#';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            particles.forEach(p => {
                // Aceleração da Viagem (Move no eixo Z)
                p.z -= 0.005;
                
                // Se a partícula passou por nós, recria no fundo escuro
                if (p.z <= 0) {
                    p.z = 1;
                    const angle = Math.random() * Math.PI * 2;
                    const radius = Math.random() * 0.5 + 0.5;
                    p.x = Math.cos(angle) * radius;
                    p.y = Math.sin(angle) * radius;
                }

                // Matemática 3D Real (Transforma X,Y,Z em tela 2D)
                const x = cx + (p.x / p.z) * canvas.width * 0.5;
                const y = cy + (p.y / p.z) * canvas.height * 0.5;
                
                // Desenha a estrela/neon e as linhas de rastro (Warp Speed)
                const size = (1 - p.z) * 2;
                
                ctx.strokeStyle = p.color;
                ctx.lineWidth = size;
                ctx.beginPath();
                ctx.moveTo(x, y);
                
                // Calcula a posição anterior para criar a linha de velocidade (Efeito Túnel)
                const prevX = cx + (p.x / (p.z + 0.015)) * canvas.width * 0.5;
                const prevY = cy + (p.y / (p.z + 0.015)) * canvas.height * 0.5;
                
                ctx.lineTo(prevX, prevY);
                ctx.stroke();
            });

            requestAnimationFrame(animate);
        }
        
        // Inicia o motor
        animate();
    </script>
</body>
</html>
